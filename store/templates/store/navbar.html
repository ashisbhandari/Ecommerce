{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClickToShop - Navbar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>
  <style>
    .navbar-nav .nav-link {
  transition: color 0.3s ease, transform 0.3s ease;
}

.navbar-nav .nav-link:hover {
  color: orange !important;
  transform: scale(1.05);
}

  </style>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold text-warning" href="/">
      <img src="{% static 'store/logo.png' %}" alt="ClickToShop Logo" height="45" class="me-2" />
      ClickToShop
    </a>

    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar"
      aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex align-items-lg-center gap-lg-3">
        <li class="nav-item">
          <form class="d-flex" role="search">
            <div class="input-group">
              <input class="form-control text-white bg-secondary border-0" type="search" placeholder="Search..."
                aria-label="Search" style="height: 45px;" />
              <button class="btn btn-outline-light border-0 bg-secondary" type="submit" style="height: 45px;">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </form>
        </li>

        <!-- Nav Links -->
        <li class="nav-item">
          <a class="nav-link active" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Recent Deals</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Help & Support</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/contact">Contact Us</a>
        </li>

        <!-- Auth Buttons -->
        <li class="nav-item">
          <a class="nav-link text-warning fw-semibold" href="javascript:void(0);" onclick="openLogin()">Login</a>
        </li>
        <li class="nav-item">
          <a class="nav-link text-warning fw-semibold" href="javascript:void(0);" onclick="openSignup()">Sign Up</a>
        </li>

      </ul>
    </div>
  </div>
</nav>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
